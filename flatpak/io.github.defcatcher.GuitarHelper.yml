# Flatpak manifest (PyQt via com.riverbankcomputing.PyQt.BaseApp).
# Upstream uses a dir source so local/CI builds work without a self-referential git commit.
# For the Flathub app repo, replace the guitarhelper module source with a git+commit or
# github archive + sha256 (see flatpak/FLATHUB.md).
app-id: io.github.defcatcher.GuitarHelper
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.10'
command: guitarhelper

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # PortAudio in this build talks to ALSA (/dev/snd); DRI alone is not enough for capture.
  - --device=all
  - --socket=pulseaudio
  - --filesystem=xdg-run/pipewire-0:rw
  - --filesystem=xdg-documents:rw

cleanup-commands:
  - /app/cleanup-BaseApp.sh

build-options:
  env:
    BASEAPP_REMOVE_WEBENGINE: '1'

modules:
  - name: portaudio
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --enable-shared
    sources:
      - type: archive
        url: https://files.portaudio.com/archives/pa_stable_v190700_20210406.tgz
        sha256: 47efbf42c77c19a05d22e627d42873e991ec0c1357219c0d74ce6a2948cb2def

  - name: portaudio-license
    buildsystem: simple
    build-commands:
      - install -Dm0644 portaudio-LICENSE.txt ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/portaudio/LICENSE.txt
    sources:
      - type: file
        url: https://raw.githubusercontent.com/PortAudio/portaudio/master/LICENSE.txt
        sha256: ec52a1952d701f94e5135719a47376da4ee0b4a0201f1cafb49f61db6480ac3d
        dest-filename: portaudio-LICENSE.txt

  - name: python3-numpy
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
          --prefix=${FLATPAK_DEST} "numpy==2.4.4" --no-build-isolation
      - install -Dm0644 numpy-LICENSE.txt ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/numpy/LICENSE.txt
    sources:
      - type: file
        url: https://raw.githubusercontent.com/numpy/numpy/v2.4.4/LICENSE.txt
        sha256: 1be1df33863f97a7bc1c4d67980bd6c69c9a6fef0a5ee76e6ad6cb91e56e8491
        dest-filename: numpy-LICENSE.txt
      - type: file
        only-arches: [x86_64]
        url: https://files.pythonhosted.org/packages/d1/73/a9d864e42a01896bb5974475438f16086be9ba1f0d19d0bb7a07427c4a8b/numpy-2.4.4-cp313-cp313-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl
        sha256: c901b15172510173f5cb310eae652908340f8dede90fff9e3bf6c0d8dfd92f83
      - type: file
        only-arches: [aarch64]
        url: https://files.pythonhosted.org/packages/7d/90/8d23e3b0dafd024bf31bdec225b3bb5c2dbfa6912f8a53b8659f21216cbf/numpy-2.4.4-cp313-cp313-manylinux_2_27_aarch64.manylinux_2_28_aarch64.whl
        sha256: 45dbed2ab436a9e826e302fcdcbe9133f9b0006e5af7168afb8963a6520da103

  - name: python3-sounddevice
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
          --prefix=${FLATPAK_DEST} "sounddevice==0.5.5" --no-build-isolation
      - install -Dm0644 sounddevice-LICENSE ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/sounddevice/LICENSE
      - install -Dm0644 cffi-LICENSE ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/cffi/LICENSE
      - install -Dm0644 pycparser-LICENSE ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/pycparser/LICENSE
    sources:
      - type: file
        url: https://raw.githubusercontent.com/spatialaudio/python-sounddevice/0.5.5/LICENSE
        sha256: b6eea21bbafbaf7a2177e492f1be6b5efc6f4e708b1980773de51cdaa52f8211
        dest-filename: sounddevice-LICENSE
      - type: file
        url: https://raw.githubusercontent.com/python-cffi/cffi/v2.0.0/LICENSE
        sha256: 5ba24ddc57067f9249add644c3afc41a5d6dc37e23433ef759d95df370b0af63
        dest-filename: cffi-LICENSE
      - type: file
        url: https://raw.githubusercontent.com/eliben/pycparser/master/LICENSE
        sha256: 0c846399369ea76ddd7b5c44fe6d16497415fcf015f5cbb508c24bf98b81c5b1
        dest-filename: pycparser-LICENSE
      - type: file
        only-arches: [x86_64]
        url: https://files.pythonhosted.org/packages/98/df/0a1755e750013a2081e863e7cd37e0cdd02664372c754e5560099eb7aa44/cffi-2.0.0-cp313-cp313-manylinux2014_x86_64.manylinux_2_17_x86_64.whl
        sha256: c8d3b5532fc71b7a77c09192b4a5a200ea992702734a2e9279a37f2478236f26
      - type: file
        only-arches: [aarch64]
        url: https://files.pythonhosted.org/packages/a9/f5/a2c23eb03b61a0b8747f211eb716446c826ad66818ddc7810cc2cc19b3f2/cffi-2.0.0-cp313-cp313-manylinux2014_aarch64.manylinux_2_17_aarch64.whl
        sha256: d48a880098c96020b02d5a1f7d9251308510ce8858940e6fa99ece33f610838b
      - type: file
        url: https://files.pythonhosted.org/packages/0c/c3/44f3fbbfa403ea2a7c779186dc20772604442dde72947e7d01069cbe98e3/pycparser-3.0-py3-none-any.whl
        sha256: b727414169a36b7d524c1c3e31839a521725078d7b2ff038656844266160a992
      - type: file
        url: https://files.pythonhosted.org/packages/1e/0a/478e441fd049002cf308520c0d62dd8333e7c6cc8d997f0dda07b9fbcc46/sounddevice-0.5.5-py3-none-any.whl
        sha256: 30ff99f6c107f49d25ad16a45cacd8d91c25a1bcdd3e81a206b921a3a6405b1f

  - name: guitarhelper
    buildsystem: simple
    build-commands:
      - install -d ${FLATPAK_DEST}/share/guitarhelper
      - cp -a main.py ui core ${FLATPAK_DEST}/share/guitarhelper/
      - install -Dm644 LICENSE ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/guitarhelper/LICENSE
      - install -Dm644 icon/guitarassistant.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
      - install -Dm644 flatpak/io.github.defcatcher.GuitarHelper.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 flatpak/io.github.defcatcher.GuitarHelper.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm755 flatpak/guitarhelper ${FLATPAK_DEST}/bin/guitarhelper
    sources:
      - type: dir
        path: ..
